```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRIKY.STORE</title>

<style>

body{
margin:0;
font-family:Arial;
background:#eaeded;
}

/* NAVBAR */

.nav{
background:#FFD814;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:20px;
font-weight:bold;
}

#searchBar{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
width:140px;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
padding:15px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
position:relative;
cursor:pointer;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.heart{
position:absolute;
top:8px;
right:10px;
font-size:18px;
cursor:pointer;
}

.stock{
color:red;
font-size:12px;
font-weight:bold;
}

button{
background:#FFD814;
border:none;
padding:10px;
width:100%;
margin-top:10px;
border-radius:6px;
cursor:pointer;
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
}

.popupbox{
background:white;
padding:20px;
width:90%;
max-width:320px;
border-radius:10px;
}

/* FAKE ORDER POPUP */

.orderPopup{
position:fixed;
bottom:20px;
left:20px;
background:white;
padding:10px 15px;
border-radius:8px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
display:none;
font-size:13px;
}

</style>
</head>

<body>

<div class="nav">

<div class="logo">TRIKY.STORE</div>

<input type="text" id="searchBar" placeholder="Search..." onkeyup="searchProducts()">

</div>

<div class="products" id="products"></div>

<div class="popup" id="popup">
<div class="popupbox" id="popupbox"></div>
</div>

<div class="orderPopup" id="orderPopup"></div>

<script>

/* PRODUCTS */

const products=[

{
name:"MINI SEALING MACHINE",
price:100,
mrp:200,
img:"product1.jpg",
stock:7,
reel:"https://www.instagram.com/triky.store/reel/DV5ZlGXEhRI/"
},

{
name:"BEAUTY FACE MASSAGE ICE ROLLER",
price:50,
mrp:200,
img:"product2.jpg",
stock:5
}

];

let cart=[];

/* LOAD PRODUCTS */

function loadProducts(){

let grid=document.getElementById("products");
grid.innerHTML="";

products.forEach((p,i)=>{

let discount=Math.round((1-p.price/p.mrp)*100);

grid.innerHTML+=`

<div class="card">

<div class="heart" onclick="toggleHeart(this)">♥</div>

<div onclick="openProduct(${i})">

<img src="${p.img}">

<div style="background:red;color:white;padding:2px 6px;font-size:12px;position:absolute;top:8px;left:8px;">
${discount}% OFF
</div>

<h4>${p.name}</h4>

<p>
<b style="color:red">₹${p.price}</b>
<span style="text-decoration:line-through;color:gray">₹${p.mrp}</span>
</p>

<div class="stock">Only ${p.stock} left</div>

</div>

</div>

`;

});

}

loadProducts();

/* HEART */

function toggleHeart(el){
el.style.color="red";
}

/* POPUP */

function openProduct(i){

let p=products[i];

let viewers=Math.floor(Math.random()*7)+3;

let reelButton="";

if(p.reel){
reelButton=`<button onclick="watchReel('${p.reel}')">🎥 Watch Reel</button>`;
}

document.getElementById("popupbox").innerHTML=`

<h3>${p.name}</h3>

<img src="${p.img}" width="100%">

<p>
<b>₹${p.price}</b>
<span style="text-decoration:line-through;color:gray">₹${p.mrp}</span>
</p>

<div class="stock">Only ${p.stock} left in stock</div>

<p style="color:red">🔴 ${viewers} people viewing this</p>

<p>⏳ Offer ends in <span id="timer">10:00</span></p>

${reelButton}

<button onclick="order('${p.name}',${p.price})">Order on Instagram</button>

<button onclick="closePopup()">Close</button>

`;

document.getElementById("popup").style.display="flex";

startTimer();

}

/* CLOSE */

function closePopup(){
document.getElementById("popup").style.display="none";
}

/* INSTAGRAM ORDER */

function order(product,price){

let message=
`Hi TRIKY.STORE 👋

I want to order this product:

Product: ${product}
Price: ₹${price}

Please send payment details.`;

let link="https://ig.me/m/triky.store?text="+encodeURIComponent(message);

window.open(link);

}

/* WATCH REEL */

function watchReel(link){
window.open(link);
}

/* TIMER */

function startTimer(){

let time=600;

let interval=setInterval(()=>{

let min=Math.floor(time/60);
let sec=time%60;

document.getElementById("timer").innerText=min+":"+(sec<10?"0"+sec:sec);

time--;

if(time<0){
clearInterval(interval);
}

},1000);

}

/* SEARCH */

function searchProducts(){

let q=document.getElementById("searchBar").value.toLowerCase();

let grid=document.getElementById("products");

grid.innerHTML="";

products.forEach((p,i)=>{

if(p.name.toLowerCase().includes(q)){

grid.innerHTML+=`

<div class="card" onclick="openProduct(${i})">

<img src="${p.img}">

<h4>${p.name}</h4>

<p>₹${p.price}</p>

</div>

`;

}

});

}

/* FAKE ORDER POPUP */

const names=["Rahul","Arjun","Neha","Vikram","Anjali"];
const cities=["Delhi","Mumbai","Kerala","Bangalore","Chennai"];

setInterval(()=>{

let name=names[Math.floor(Math.random()*names.length)];

let city=cities[Math.floor(Math.random()*cities.length)];

let product=products[Math.floor(Math.random()*products.length)].name;

let box=document.getElementById("orderPopup");

box.innerText=`${name} from ${city} just ordered ${product}`;

box.style.display="block";

setTimeout(()=>{
box.style.display="none";
},4000);

},8000);

</script>

</body>
</html>
```
